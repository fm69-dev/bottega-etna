# ============================================================
#  netlify.toml – La Bottega dell'Etna
#  Configurazione deploy + header di sicurezza HTTP
# ============================================================

[build]
  publish = "."        # la cartella root contiene index.html

# ------------------------------------
#  HEADER DI SICUREZZA HTTP
#  (questi sono header veri, molto più
#   efficaci dei meta tag nell'HTML)
# ------------------------------------
[[headers]]
  for = "/*"
  [headers.values]

    # Impedisce al browser di indovinare il tipo di file
    X-Content-Type-Options = "nosniff"

    # Impedisce che il sito venga incorporato in iframe da altri siti (clickjacking)
    X-Frame-Options = "SAMEORIGIN"

    # Controlla quali informazioni vengono inviate al sito di destinazione
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disabilita funzioni del browser non necessarie (microfono, fotocamera, ecc.)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Content Security Policy: definisce da dove possono caricarsi risorse
    # ⚠️  Se aggiungi script o font da altri domini, aggiorna questa lista
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https://res.cloudinary.com;
      frame-src https://www.google.com;
      connect-src 'self';
      upgrade-insecure-requests;
    """

    # Forza HTTPS per 1 anno (attivato automaticamente da Netlify)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

    # Protezione XSS per browser meno recenti
    X-XSS-Protection = "1; mode=block"

# ------------------------------------
#  CACHE: immagini e font in cache lunga
#  (velocità di caricamento)
# ------------------------------------
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ------------------------------------
#  REDIRECT: www → non-www (SEO)
#  ⚠️  Sostituisci labottegadelletna.it
#      con il tuo dominio reale
# ------------------------------------
[[redirects]]
  from = "https://www.labottegadelletna.it/*"
  to   = "https://labottegadelletna.it/:splat"
  status = 301
  force  = true

# Pagina 404 personalizzata (opzionale, crea 404.html se vuoi)
# [[redirects]]
#   from   = "/*"
#   to     = "/404.html"
#   status = 404
